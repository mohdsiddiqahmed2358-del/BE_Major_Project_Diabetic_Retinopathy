{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - RetinaDetect{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center py-4">
                <h3><i class="fas fa-eye me-2"></i>RetinaDetect</h3>
                <p class="mb-0">Diabetic Retinopathy Detection System</p>
            </div>
            <div class="card-body p-4">
                <h4 class="card-title text-center mb-4">Login to Your Account</h4>
                
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="mb-0">Don't have an account? 
                        <a href="{% url 'users:register' %}" class="text-decoration-none">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
